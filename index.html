<title>M. Barış Öztürk — Prime Technology Security OÜ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 700px at 50% -5%, #16191f 0%, #0a0b0e 60%), #0a0b0e;
    color:#e8ebf0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 18px 40px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center}
  .card-img{
    width:100%;
    border-radius:16px;
    display:block;
    box-shadow:0 26px 70px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.06);
  }
  .actions{
    width:100%;
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:15px 18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:13px;
    color:#e8ebf0;
    text-decoration:none;
    font-size:15px;
    transition:background .18s ease,border-color .18s ease,transform .12s ease;
  }
  .btn:hover{background:rgba(91,143,199,.12);border-color:#5b8fc7;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn svg{width:19px;height:19px;color:#5b8fc7;flex:0 0 19px}
  .btn b{font-weight:600}
  .save{
    justify-content:center;
    background:linear-gradient(120deg,#3b6ea5,#5b8fc7);
    border:none;
    color:#fff;
    font-weight:700;
    letter-spacing:.03em;
    box-shadow:0 8px 24px rgba(59,110,165,.35);
    margin-top:4px;
  }
  .save svg{color:#fff}
  .save:hover{background:linear-gradient(120deg,#3b6ea5,#5b8fc7);transform:translateY(-2px)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
